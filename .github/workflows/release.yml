name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: 'true'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: mozilla-actions/sccache-action@v0.0.9
      - name: Install mold
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends mold
      - run: cargo fmt --check
      - run: cargo test --locked
        env:
          RUSTFLAGS: -C link-arg=-fuse-ld=mold
      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

  binaries:
    name: Build ${{ matrix.name }} binary
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            binary: kiro-rs-cache-simulator
            archive: kiro-rs-cache-simulator-linux-x86_64.tar.gz
            package: tar -czf dist/kiro-rs-cache-simulator-linux-x86_64.tar.gz -C target/release kiro-rs-cache-simulator
          - name: windows-x86_64
            os: windows-latest
            binary: kiro-rs-cache-simulator.exe
            archive: kiro-rs-cache-simulator-windows-x86_64.zip
            package: Compress-Archive -Path target/release/kiro-rs-cache-simulator.exe -DestinationPath dist/kiro-rs-cache-simulator-windows-x86_64.zip
          - name: macos-aarch64
            os: macos-14
            binary: kiro-rs-cache-simulator
            archive: kiro-rs-cache-simulator-macos-aarch64.tar.gz
            package: tar -czf dist/kiro-rs-cache-simulator-macos-aarch64.tar.gz -C target/release kiro-rs-cache-simulator
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: mozilla-actions/sccache-action@v0.0.9
      - name: Install mold
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends mold
      - run: cargo build --release --locked
        env:
          RUSTFLAGS: ${{ matrix.os == 'ubuntu-latest' && '-C link-arg=-fuse-ld=mold' || '' }}
      - name: Show sccache stats
        if: always()
        run: sccache --show-stats
      - run: mkdir dist
      - name: Package binary
        shell: pwsh
        run: ${{ matrix.package }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error

  github-release:
    name: Publish GitHub Release
    needs: binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
