name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  IMAGE_NAME: ghcr.io/ai-trash/kiro-rs-cache-simulator

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo test --locked

  binaries:
    name: Build ${{ matrix.name }} binary
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            binary: kiro-rs-cache-simulator
            archive: kiro-rs-cache-simulator-linux-x86_64.tar.gz
            package: tar -czf dist/kiro-rs-cache-simulator-linux-x86_64.tar.gz -C target/release kiro-rs-cache-simulator
          - name: windows-x86_64
            os: windows-latest
            binary: kiro-rs-cache-simulator.exe
            archive: kiro-rs-cache-simulator-windows-x86_64.zip
            package: Compress-Archive -Path target/release/kiro-rs-cache-simulator.exe -DestinationPath dist/kiro-rs-cache-simulator-windows-x86_64.zip
          - name: macos-aarch64
            os: macos-14
            binary: kiro-rs-cache-simulator
            archive: kiro-rs-cache-simulator-macos-aarch64.tar.gz
            package: tar -czf dist/kiro-rs-cache-simulator-macos-aarch64.tar.gz -C target/release kiro-rs-cache-simulator
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --locked
      - run: mkdir dist
      - name: Package binary
        shell: pwsh
        run: ${{ matrix.package }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error

  github-release:
    name: Publish GitHub Release
    needs: binaries
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  image:
    name: Build and publish GHCR image
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
